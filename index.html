<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hbird & mitts — CS2 playbook</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;500;600;700&display=swap');
:root{
  --bg:#0d0f12;--surface:#13161b;--surface2:#1a1e25;--border:#252a34;
  --text:#e8eaf0;--muted:#6b7280;
  --hbird:#8b7fff;--hbird-bg:#18153a;--hbird-bd:#3d3380;
  --mitts:#ff8a60;--mitts-bg:#1e1208;--mitts-bd:#7a3a20;
  --smoke:#2cb67d;--smoke-bg:#0a1f16;--smoke-bd:#1a5c40;
  --wait:#f5a623;--wait-bg:#1a1200;--wait-bd:#5a3e00;
  --t:#d4a843;--t-bg:#1a1300;--t-bd:#5a4000;
  --ct:#4a90d9;--ct-bg:#091826;--ct-bd:#1e3d6e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
.hdr{padding:12px 14px 10px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:10px}
.hdr-mono{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.12em}
.hdr-title{font-size:15px;font-weight:700}
.hdr-title .h{color:var(--hbird)}
.hdr-title .m{color:var(--mitts)}
.pgrid{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.pbtn{padding:11px 0;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:var(--surface);color:var(--muted);transition:all .15s}
.ph{background:var(--hbird-bg);color:var(--hbird);border-bottom:2px solid var(--hbird)}
.pm{background:var(--mitts-bg);color:var(--mitts);border-bottom:2px solid var(--mitts)}
.mbar{display:flex;overflow-x:auto;gap:4px;padding:8px 10px;background:var(--surface);border-bottom:1px solid var(--border);scrollbar-width:none}
.mbar::-webkit-scrollbar{display:none}
.mbtn{padding:5px 11px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:.05em;cursor:pointer;white-space:nowrap;transition:all .12s;flex-shrink:0}
.mbtn.on{background:var(--surface2);border-color:#3d4455;color:var(--text)}
.sbar{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border)}
.sbtn{padding:8px 0;border-radius:4px;border:1px solid var(--border);background:var(--surface);font-family:'Barlow',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;color:var(--muted);transition:all .12s;text-align:center}
.st{background:var(--t-bg);border-color:var(--t-bd);color:var(--t)}
.sc{background:var(--ct-bg);border-color:var(--ct-bd);color:var(--ct)}
.content{padding:10px}
.plabel{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin:10px 0 5px}
.plabel:first-child{margin-top:0}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:6px}
.pname{padding:8px 12px 7px;font-size:13px;font-weight:700;letter-spacing:.03em;border-bottom:1px solid var(--border)}
.pname-h{color:var(--hbird)}
.pname-m{color:var(--mitts)}
.steps{padding:8px 10px 10px;display:flex;flex-direction:column;gap:7px}
.step{display:flex;gap:9px;align-items:flex-start}
.snum{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:10px;flex-shrink:0;margin-top:1px}
.nh{background:var(--hbird-bg);color:var(--hbird);border:1px solid var(--hbird-bd)}
.nm{background:var(--mitts-bg);color:var(--mitts);border:1px solid var(--mitts-bd)}
.stxt{font-size:13px;line-height:1.45;color:#c8ccd6}
.tag{display:inline-block;font-family:'Share Tech Mono',monospace;font-size:10px;padding:1px 6px;border-radius:2px;margin-left:4px;vertical-align:middle;letter-spacing:.04em}
.tsmoke{background:var(--smoke-bg);color:var(--smoke);border:1px solid var(--smoke-bd)}
.twait{background:var(--wait-bg);color:var(--wait);border:1px solid var(--wait-bd)}
.empty{text-align:center;color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:.08em;padding:28px 0}

.lineup-btn{display:inline-block;font-family:'Share Tech Mono',monospace;font-size:10px;padding:1px 7px;border-radius:2px;margin-left:6px;vertical-align:middle;letter-spacing:.04em;cursor:pointer;background:#0d1f2d;color:#4a90d9;border:1px solid #1e3d6e;transition:all .12s}
.lineup-btn:hover{background:#1a3a5c}
.lineup-wrap{margin-top:10px;display:none;flex-direction:column;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px}
.lineup-wrap.open{display:flex}
.lineup-img{width:100%;max-width:500px;border-radius:5px;border:1px solid var(--border);display:block;cursor:zoom-in;transition:max-width .2s}
.lineup-img.zoomed{max-width:100%;cursor:zoom-out}
.lineup-steps{display:flex;flex-direction:column;gap:14px;padding:4px 0}
.lineup-step{display:flex;flex-direction:column;gap:3px}
.ls-label{font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.ls-val{font-family:'Barlow',sans-serif;font-size:18px;font-weight:700;color:#e8eaf0;line-height:1.2}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-mono">CS2</div>
  <div class="hdr-title"><span class="h">hbird</span> &amp; <span class="m">mitts</span> — duo playbook</div>
</div>
<div class="pgrid">
  <button class="pbtn ph" id="bh" onclick="setP('hbird')">hbird (you)</button>
  <button class="pbtn" id="bm" onclick="setP('mitts')">mitts</button>
</div>
<div class="mbar" id="mr"></div>
<div class="sbar">
  <button class="sbtn st" id="bt" onclick="setS('t')">T side</button>
  <button class="sbtn" id="bc" onclick="setS('ct')">CT side</button>
</div>
<div class="content" id="pc"></div>
<script>
var pl='hbird',mp='mirage',sd='t';
var D={
mirage:{
t:{
hbird:[
{n:"B rush — smoke Market Window",s:[
{t:"Jump-throw smoke Market Window from T-spawn boxes (aim at top of the antenna).",g:"smoke",img:"img/lineups/smoke/mirage-market-window-t-apps.png",imgCaption:"Position|T-Apps boxes corner|Technique|Jump + Left Click|Movement|Stationary"},
{t:"Call 'window smoked' then sprint B Apps with mitts. Full commit, no slowing."},
{t:"Enter Apps window into B (right side). Mitts goes through the Apps door (left).",g:"wait"},
{t:"Mitts' Van smoke cuts Short CT angle. Plant back-B behind the boxes."},
{t:"Post-plant: you hold Market side, mitts holds Van/Short. Split the angles."}
]},
{n:"A Ramp + Palace split",s:[
{t:"Smoke CT spawn from T-ramp (aim at the tip of the CT building, jump-throw).",g:"smoke",img:"img/lineups/smoke/mirage-ticket-aramp.png",imgCaption:"Position|T-spawn corner towards Ramp|Technique|Jump + Left Click|Movement|Stationary"},
{t:"Call 'CT smoked'. Mitts smokes Jungle from T-spawn. Wait for both.",g:"wait"},
{t:"Push Ramp hard. Pre-aim Stairs angle as you come over the crest."},
{t:"Mitts pushes Palace simultaneously. Two angles CTs cannot hold at once."},
{t:"Meet on site. Plant default between the boxes near Ticket Booth."}
]},
{n:"Mid pressure → Short → B",s:[
{t:"Push Top Mid and peek Catwalk/Window to bait CT info.",g:"wait"},
{t:"If window is empty or you trade: smoke Connector from Catwalk.",g:"smoke",img:"img/lineups/smoke/mirage-conector-tspawncorner.png",imgCaption:"Position|T-spawn corner outside T-Apps|Technique|Jump + Left Click|Movement|Stationary"},
{t:"Call 'connector smoked, going Short'. Mitts follows from T-side into Short."},
{t:"Drop Short to B together. You enter through Kitchen, mitts through Van gap."},
{t:"Speed advantage replaces the second smoke. Plant fast."}
]}
],
mitts:[
{n:"B rush — smoke Van",s:[
{t:"Sprint B Apps immediately. Do not stop.",g:"wait"},
{t:"Smoke Van from inside Apps (aim at the corner of the Van roof).",g:"smoke",img:"img/lineups/smoke/mirage-bench-van-t-apps.png",imgCaption:"Position|Underpass Post|Technique|Left Click|Movement|Stationary"},
{t:"Call 'van smoked'. Wait for hbird's 'window smoked' before entering B.",g:"wait"},
{t:"Enter B through Apps door on the left. hbird enters through the window (right)."},
{t:"Post-plant: hold Van/Short side. hbird holds Market. Don't cross angles."}
]},
{n:"A Ramp + Palace split",s:[
{t:"Wait for hbird's 'CT smoked' call.",g:"wait"},
{t:"Smoke Jungle from T-spawn (aim at the wooden awning edge above Jungle).",g:"smoke",img:"img/lineups/smoke/mirage-jungle-tspawn.png",imgCaption:"Position|T-spawn building edge|Technique|Jump + Left Click|Movement|Stationary"},
{t:"Push Palace right after your smoke pops. Pre-aim CT position inside."},
{t:"Enter A from Palace. hbird enters from Ramp. Crossfire any Stairs/CT defender."},
{t:"Clear Ticket Booth on entry — most common CT hide. Call 'ticket CT' if there."}
]},
{n:"Mid pressure → Short → B",s:[
{t:"Hold T-side until hbird's 'connector smoked' call.",g:"wait"},
{t:"Sprint through Short the moment you hear it. First in calls 'short clear'.",g:"smoke"},
{t:"Enter B through Van gap (left). hbird enters through Kitchen (right)."},
{t:"Call 'in site'. Plant behind the boxes. Two angles covered — hold post-plant."}
]}
]
},
ct:{
hbird:[
{n:"Ticket Booth anchor A",s:[
{t:"Play Ticket Booth. Covers Ramp AND Palace simultaneously from one position.",g:"wait"},
{t:"Smoke Short only after mitts' explicit 'two Short rushing' call.",g:"smoke"},
{t:"Your info every 15s: 'A quiet' / 'two Ramp' / 'Palace player'. Never silent."},
{t:"Rotate to B ONLY after mitts calls 'planting B' or 'one alive B'.",g:"wait"},
{t:"Retake A: you from CT spawn, mitts over Short. Crossfire Ramp and Palace."}
]},
{n:"Window early info",s:[
{t:"Take Window early round. One peek mid — call what you see — drop back.",g:"wait"},
{t:"Call: 'two top-mid' / 'one window' / 'catwalk pressure' / 'mid clear'."},
{t:"Smoke Catwalk if Ts got Top Mid — blocks Short pressure.",g:"smoke"},
{t:"Fall back to Ticket Booth. Mid info shapes mitts' B reads all round."}
]}
],
mitts:[

{t:"Rotate to A only on hbird's explicit 'A going' call AND B is clear.",g:"wait"},
{t:"Retake B: enter from Short. hbird comes from CT spawn. Crossfire."}
]},
{n:"Short early peek",s:[

{t:"Smoke Apps entrance if you spot a flash coming through Apps.",g:"smoke"},

{t:"Short info lets hbird decide: stay A or rotate."}
]}
]

},
inferno:{

{n:"Banana fake → Apps A rush",s:[

],
mitts:[

{n:"A Apartments execute",s:[

{n:"Banana fake → Apps A rush",s:[

]}
]
},
ct:{
hbird:[
{n:"Close-Banana anchor",s:[
{t:"Hold close Banana (near Car). Rifle rounds: one aggressive peek, fall back.",g:"wait"},

{n:"Balcony info peek",s:[

]}
]

nuke:{
t:{

{t:"You clear Control Room side. Mitts watches Hatch from below."},

]},
{n:"Outside fake → Secret Lower",s:[

],
mitts:[

]},
{n:"Outside fake → Secret Lower",s:[

]

ancient:{

var maps=['mirage','inferno','nuke','ancient','dust2','overpass','anubis','cache'];
var ml={mirage:'Mirage',inferno:'Inferno',nuke:'Nuke',ancient:'Ancient',dust2:'Dust 2',overpass:'Overpass',anubis:'Anubis',cache:'Cache'};
function setP(p){pl=p;document.getElementById('bh').className='pbtn'+(p==='hbird'?' ph':'');document.getElementById('bm').className='pbtn'+(p==='mitts'?' pm':'');render();}
function setM(m){mp=m;document.querySelectorAll('.mbtn').forEach(function(b){b.classList.toggle('on',b.dataset.m===m)});render();}
function setS(s){sd=s;document.getElementById('bt').className='sbtn'+(s==='t'?' st':'');document.getElementById('bc').className='sbtn'+(s==='ct'?' sc':'');render();}
var mr=document.getElementById('mr');
maps.forEach(function(m,i){var b=document.createElement('button');b.className='mbtn'+(i===0?' on':'');b.dataset.m=m;b.textContent=ml[m];b.onclick=function(){setM(m)};mr.appendChild(b);});
function render(){
  var el=document.getElementById('pc');
  var pk=pl==='hbird'?'hbird':'mitts';
  var nc=pl==='hbird'?'nh':'nm';
  var nclass=pl==='hbird'?'pname-h':'pname-m';
  var plays=D[mp]&&D[mp][sd]&&D[mp][sd][pk];
  if(!plays||!plays.length){el.innerHTML='<div class="empty">// no plays defined</div>';return;}
  el.innerHTML=plays.map(function(play,pi){
    var steps=play.s.map(function(s,i){
      var tag=s.g==='smoke'?'<span class="tag tsmoke">SMOKE</span>':s.g==='wait'?'<span class="tag twait">WAIT</span>':'';
      var lineupHtml='';
      if(s.img){
        var uid='lu-'+mp+'-'+sd+'-'+pk+'-'+pi+'-'+i;
        var parts=s.imgCaption.split('|');
        var stepsHtml='<div class="lineup-steps">';
        for(var k=0;k<parts.length;k+=2){
          stepsHtml+='<div class="lineup-step"><span class="ls-label">'+parts[k]+'</span><span class="ls-val">'+( parts[k+1]||'')+'</span></div>';
        }
        stepsHtml+='</div>';
        lineupHtml='<span class="lineup-btn" onclick="toggleLineup(\''+uid+'\')">'+'LINEUP</span><div class="lineup-wrap" id="'+uid+'"><img class="lineup-img" src="'+s.img+'" alt="Smoke lineup" onclick="toggleZoom(this)">'+stepsHtml+'</div>';
      }
      return '<div class="step"><div class="snum '+nc+'">'+(i+1)+'</div><div class="stxt">'+s.t+tag+lineupHtml+'</div></div>';
    }).join('');
    return '<div class="plabel">play '+(pi+1)+'</div><div class="pcard"><div class="pname '+nclass+'">'+play.n+'</div><div class="steps">'+steps+'</div></div>';
  }).join('');
}
function toggleLineup(id){
  var el=document.getElementById(id);
  if(el)el.classList.toggle('open');
}
function toggleZoom(img){
  img.classList.toggle('zoomed');
}
render();
</script>
